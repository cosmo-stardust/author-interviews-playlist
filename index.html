<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Author Interview Playlist — GRRM & J.K. Rowling</title>
  <style>
    :root{--bg:#0b0d12;--card:#151925;--text:#e8edf5;--muted:#9aa5b1;--accent:#6ea8fe;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);} 
    header{padding:32px 20px;border-bottom:1px solid #1f2433;background:#0f1320;position:sticky;top:0;z-index:2;}
    h1{margin:0 0 8px 0;font-size:24px;}
    .sub{color:var(--muted);font-size:14px;}
    .controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;}
    select,input{background:#0f1320;border:1px solid #2a3142;color:var(--text);padding:8px 10px;border-radius:8px;}
    main{padding:20px;max-width:1100px;margin:0 auto;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .card{background:var(--card);border:1px solid #20263a;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;}
    .thumb{position:relative;padding-top:56.25%;background:#0f1320;}
    .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .content{padding:12px 14px 16px 14px;display:flex;flex-direction:column;gap:8px;}
    .meta{font-size:12px;color:var(--muted);} 
    a{color:var(--accent);text-decoration:none;}
    .title{font-weight:600;font-size:15px;line-height:1.3;}
    .summary{font-size:13px;color:#c7d0dd;}
    .footer{padding:24px 20px;color:var(--muted);font-size:12px;text-align:center;}
  </style>
</head>
<body>
  <header>
    <h1>Author Interview Playlist</h1>
    <div class="sub">George R. R. Martin & J.K. Rowling · Chronological · Updated: <span id="updated"></span></div>
    <div class="controls">
      <select id="authorFilter">
        <option value="all">All authors</option>
        <option value="George R. R. Martin">George R. R. Martin</option>
        <option value="J.K. Rowling">J.K. Rowling</option>
      </select>
      <input id="search" type="text" placeholder="Search titles..." />
    </div>
  </header>
  <main>
    <div id="count" class="sub" style="margin:6px 0 16px 0;"></div>
    <div id="grid" class="grid"></div>
  </main>
  <div class="footer">Best-effort archive. If you find missing interviews, send them and I’ll add.</div>

<script>
const YT_THUMB = (url) => {
  const m = url.match(/v=([a-zA-Z0-9_-]{6,})/);
  return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : "";
};

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('updated').textContent = data.updated;
    const items = data.items.map(i => ({...i, summary: i.summary || i.title}));

    const render = () => {
      const author = document.getElementById('authorFilter').value;
      const q = document.getElementById('search').value.toLowerCase();
      let filtered = items.filter(i => (author === 'all' || i.author === author));
      if (q) filtered = filtered.filter(i => (i.title + ' ' + i.author).toLowerCase().includes(q));
      // sort by date (year or full date)
      filtered.sort((a,b) => (a.date > b.date ? 1 : -1));
      document.getElementById('count').textContent = `${filtered.length} interviews`;
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for (const i of filtered) {
        const card = document.createElement('div');
        card.className = 'card';
        const thumb = YT_THUMB(i.url);
        card.innerHTML = `
          <div class="thumb">${thumb ? `<img src="${thumb}" alt="${i.title}" />` : ''}</div>
          <div class="content">
            <div class="meta">${i.author} · ${i.date} · ${i.source}</div>
            <div class="title">${i.title}</div>
            <div class="summary">${i.summary}</div>
            <div><a href="${i.url}" target="_blank" rel="noopener">Watch</a></div>
          </div>
        `;
        grid.appendChild(card);
      }
    };

    document.getElementById('authorFilter').addEventListener('change', render);
    document.getElementById('search').addEventListener('input', render);
    render();
  });
</script>
</body>
</html>
